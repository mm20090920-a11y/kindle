<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>每日看板 · selina</title>
<style>
  /* 深色(默认) */
  :root{
    --bg:#0f1116; --card:#1a1e27; --card2:#20252f; --ink:#e9ecf2; --sub:#8b93a3;
    --line:#2a2f3a; --up:#ff5b5b; --down:#25c281; --accent:#5b8cff; --shadow:0 1px 2px rgba(0,0,0,.4),0 10px 30px rgba(0,0,0,.25);
  }
  body.light{
    --bg:#eef1f5; --card:#ffffff; --card2:#f4f6f9; --ink:#1a1d24; --sub:#8a909c;
    --line:#eceef2; --up:#e23b3b; --down:#1aa053; --accent:#2b6cff; --shadow:0 1px 3px rgba(20,30,60,.06),0 8px 24px rgba(20,30,60,.05);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",Segoe UI,Roboto,sans-serif;
    background:var(--bg);color:var(--ink);line-height:1.5;padding:28px 20px 60px;transition:background .2s,color .2s}
  .wrap{max-width:1200px;margin:0 auto}
  header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:22px}
  h1{font-size:30px;font-weight:800;letter-spacing:1px}
  h1 .dot{color:var(--accent)}
  .right{display:flex;align-items:center;gap:14px}
  .meta{color:var(--sub);font-size:14px}
  .toggle{cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);
    border-radius:20px;padding:6px 14px;font-size:13px;font-weight:600;user-select:none}
  .sec-title{font-size:14px;font-weight:700;color:var(--sub);letter-spacing:3px;margin:26px 4px 12px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}
  .card{background:var(--card);border-radius:16px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--line)}
  .card .name{font-size:13px;color:var(--sub);font-weight:600;margin-bottom:8px}
  .card .val{font-size:28px;font-weight:800;font-variant-numeric:tabular-nums;letter-spacing:.5px}
  .card .chg{font-size:14px;font-weight:700;margin-top:5px;font-variant-numeric:tabular-nums}
  .card .unit{font-size:12px;color:var(--sub);margin-top:5px}
  .up{color:var(--up)} .down{color:var(--down)}
  .spark{display:block;width:100%;height:42px;margin-top:10px}
  .spark-base{stroke:var(--line);stroke-width:1;stroke-dasharray:3 3}

  .cols{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  @media(max-width:760px){.cols{grid-template-columns:1fr}}
  .list-card{background:var(--card);border-radius:16px;padding:6px 8px 12px;box-shadow:var(--shadow);border:1px solid var(--line)}
  .list-head{display:flex;align-items:center;gap:8px;padding:12px 14px 10px;font-weight:800;font-size:16px}
  .list-head .badge{font-size:12px;font-weight:700;color:#fff;background:var(--accent);border-radius:8px;padding:2px 8px}
  .row{display:flex;gap:12px;align-items:flex-start;padding:10px 14px;border-top:1px solid var(--line)}
  .row .rank{flex:0 0 24px;text-align:center;font-weight:800;color:var(--sub);font-size:15px}
  .row.top .rank{color:var(--up)}
  .row .txt{font-size:15px}
  .row a{color:inherit;text-decoration:none} .row a:hover{color:var(--accent);text-decoration:underline}
  .empty{padding:16px 14px;color:var(--sub)}
  footer{margin-top:30px;text-align:center;color:var(--sub);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>每日看板<span class="dot">.</span></h1>
    <div class="right">
      <span class="meta" id="meta">加载中…</span>
      <span class="toggle" id="toggle" onclick="toggleTheme()">☀️ 浅色</span>
    </div>
  </header>

  <div class="sec-title">股市 · 金价 · 汇率 · 币</div>
  <div class="grid" id="fin"></div>

  <div class="cols">
    <div>
      <div class="sec-title">微博热搜</div>
      <div class="list-card"><div class="list-head"><span class="badge">微博</span> 实时热搜</div><div id="weibo"></div></div>
    </div>
    <div>
      <div class="sec-title">知乎热榜</div>
      <div class="list-card"><div class="list-head"><span class="badge">知乎</span> 热榜</div><div id="zhihu"></div></div>
    </div>
  </div>

  <footer>数据每天自动更新 · 同步自 selina 的 Kindle 看板 · 页面每 5 分钟自动刷新</footer>
</div>

<script>
function chgClass(pct){ return (pct && pct.indexOf('-')===0) ? 'down' : 'up'; } /* 红涨绿跌 */
function el(tag,cls,html){var e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;}

/* 明暗切换 */
function applyTheme(t){
  document.body.className = (t==='light')?'light':'';
  document.getElementById('toggle').textContent = (t==='light')?'🌙 深色':'☀️ 浅色';
}
function toggleTheme(){
  var t = document.body.className==='light' ? 'dark' : 'light';
  try{ localStorage.setItem('board_theme', t); }catch(e){}
  applyTheme(t);
}
(function(){ var t='dark'; try{ t=localStorage.getItem('board_theme')||'dark'; }catch(e){} applyTheme(t); })();

/* sparkline: 日内走势 */
function sparkline(trend, up){
  if(!trend || trend.length<2) return '';
  var w=220,h=42, min=Math.min.apply(null,trend), max=Math.max.apply(null,trend), rng=(max-min)||1;
  var pts=trend.map(function(v,i){ var x=(i/(trend.length-1))*w; var y=(h-3)-((v-min)/rng)*(h-6); return x.toFixed(1)+','+y.toFixed(1); }).join(' ');
  var base=trend[0], by=(h-3)-((base-min)/rng)*(h-6);
  var col= up ? 'var(--up)' : 'var(--down)';
  return '<svg class="spark" viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none">'+
         '<line class="spark-base" x1="0" y1="'+by.toFixed(1)+'" x2="'+w+'" y2="'+by.toFixed(1)+'"/>'+
         '<polyline points="'+pts+'" fill="none" stroke="'+col+'" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>';
}

function render(d){
  document.getElementById('meta').textContent = '更新于 ' + (d.updatedAt||d.date||'');
  var fin=document.getElementById('fin'); fin.innerHTML='';

  (d.stocks||[]).forEach(function(s){
    var c=el('div','card');
    c.appendChild(el('div','name',s.name));
    c.appendChild(el('div','val',s.value));
    c.appendChild(el('div','chg '+chgClass(s.pct), (s.change||'')+'　'+(s.pct||'')));
    var _up = (s.up!==undefined && s.up!==null) ? s.up : (chgClass(s.pct)==='up');
    if(s.trend && s.trend.length) c.insertAdjacentHTML('beforeend', sparkline(s.trend, _up));
    fin.appendChild(c);
  });
  if(d.gold){ var c=el('div','card'); c.appendChild(el('div','name',d.gold.name)); c.appendChild(el('div','val',d.gold.value)); c.appendChild(el('div','unit',d.gold.unit||'')); fin.appendChild(c); }
  (d.forex||[]).forEach(function(f){ var c=el('div','card'); c.appendChild(el('div','name',f.name+' / 人民币')); c.appendChild(el('div','val',f.value)); fin.appendChild(c); });
  if(d.btc){ var c=el('div','card'); c.appendChild(el('div','name','比特币 BTC')); c.appendChild(el('div','val','$'+d.btc.usd)); c.appendChild(el('div','chg '+chgClass(d.btc.pct), '¥'+d.btc.cny+'　'+(d.btc.pct||''))); fin.appendChild(c); }

  ['weibo','zhihu'].forEach(function(key){
    var box=document.getElementById(key); box.innerHTML='';
    var arr=d[key]||[];
    if(!arr.length){ box.appendChild(el('div','empty','暂无数据')); return; }
    arr.forEach(function(t,i){
      var title=(t&&t.title!=null)?t.title:t, link=(t&&t.link)?t.link:'';
      var r=el('div','row'+(i<3?' top':''));
      r.appendChild(el('div','rank',(i+1)));
      r.appendChild(el('div','txt', link?('<a href="'+link+'" target="_blank" rel="noopener">'+title+'</a>'):title));
      box.appendChild(r);
    });
  });
}

function load(){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','./data/dashboard.json?t='+Date.now(),true);
  xhr.onreadystatechange=function(){ if(xhr.readyState===4 && xhr.status===200){ try{ render(JSON.parse(xhr.responseText)); }catch(e){ document.getElementById('meta').textContent='数据解析失败'; } } };
  xhr.send();
}
load(); setInterval(load, 5*60*1000);
</script>
</body>
</html>
